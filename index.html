<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Zleceń — studio55</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
:root{--bk:#1a1a1a;--bk2:#242424;--bk3:#333;--yw:#F5C518;--yw-d:#D4A800;--yw-l:#FFF8DC;--bg:#F5F5F5;--s:#fff;--b:#E0E0E0;--t:#1a1a1a;--m:#666;--r:8px;--ok:#16a34a;--okb:#dcfce7;--no:#dc2626;--nob:#fee2e2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);line-height:1.5}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bk);padding:20px}
.login-box{background:var(--bk2);border:1px solid var(--bk3);border-radius:12px;padding:36px;width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:26px}
.login-logo .brand{color:var(--yw);font-size:26px;font-weight:900;letter-spacing:-.5px}
.login-logo .sub{color:#777;font-size:11px;letter-spacing:3px;margin-top:2px}
.login-box .fg{margin-bottom:14px}
.login-box label{display:block;font-size:11px;font-weight:700;margin-bottom:5px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.login-box input{width:100%;padding:11px 14px;background:var(--bk3);border:1px solid #444;border-radius:6px;font-size:14px;color:#fff;font-family:inherit}
.login-box input:focus{outline:none;border-color:var(--yw);box-shadow:0 0 0 3px rgba(245,197,24,.15)}
.login-box input::placeholder{color:#666}
.btn-login{width:100%;padding:12px;background:var(--yw);color:var(--bk);border:none;border-radius:6px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px}
.btn-login:hover{background:var(--yw-d)}.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:#f87171;font-size:13px;margin-top:10px;text-align:center;min-height:18px}
.login-lang{text-align:center;margin-top:16px}
.login-lang button{background:none;border:1px solid #444;padding:3px 9px;border-radius:4px;cursor:pointer;font-size:11px;color:#888;font-weight:700;margin:0 2px}
.login-lang button.active{background:var(--yw);color:var(--bk);border-color:var(--yw)}
.hdr{background:var(--bk);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;border-bottom:3px solid var(--yw);position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:16px}
.hdr-brand{color:var(--yw);font-size:19px;font-weight:900;letter-spacing:-.5px}
.hdr-brand .s{display:block;font-size:8px;color:#666;letter-spacing:2px;font-weight:400;margin-top:-3px}
.hdr-client-logo{height:32px;max-width:130px;object-fit:contain;border-left:1px solid #3a3a3a;padding-left:16px}
.hdr-r{display:flex;align-items:center;gap:8px}
.lb{background:none;border:1px solid #444;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;color:#999;font-weight:700}
.lb:hover{border-color:var(--yw);color:var(--yw)}.lb.active{background:var(--yw);color:var(--bk);border-color:var(--yw)}
.ub{font-size:12px;color:#bbb;background:var(--bk2);padding:4px 11px;border-radius:12px;border:1px solid #3a3a3a;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{background:none;border:1px solid #444;padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;color:#888;font-weight:700}
.btn-logout:hover{border-color:var(--no);color:var(--no)}
.cnt{max-width:1150px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bk);padding:4px;border-radius:var(--r)}
.tab{flex:1;padding:9px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;color:#888;font-family:inherit}
.tab.active{background:var(--yw);color:var(--bk)}.tab:hover:not(.active){background:var(--bk2);color:#ccc}
.tab-ico{flex:0 0 44px}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:12px}
.ch{font-size:13px;font-weight:800;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--yw);text-transform:uppercase;letter-spacing:.4px}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;font-weight:700;margin-bottom:4px;color:var(--m);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 11px;border:1px solid var(--b);border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--yw);box-shadow:0 0 0 3px rgba(245,197,24,.15)}
textarea{resize:vertical;min-height:62px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-p{background:var(--yw);color:var(--bk)}.btn-p:hover{background:var(--yw-d)}
.btn-ok{background:var(--ok);color:#fff}.btn-no{background:var(--no);color:#fff}
.btn-o{background:none;border:1px solid var(--b);color:var(--t)}.btn-o:hover{background:var(--bg)}
.btn-sm{padding:5px 11px;font-size:12px}.btn:disabled{opacity:.4;cursor:not-allowed}
table.otbl{width:100%;border-collapse:collapse;font-size:13px}
.otbl th{text-align:left;padding:10px;background:var(--bk);color:#bbb;font-size:10px;font-weight:800;border-bottom:2px solid var(--yw);cursor:pointer;user-select:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.otbl th:hover{color:var(--yw)}.otbl th.sorted{color:var(--yw)}
.otbl th .arr{font-size:8px;margin-left:3px;opacity:.4}.otbl th.sorted .arr{opacity:1}
.otbl td{padding:9px 10px;border-bottom:1px solid var(--b);vertical-align:middle}
.otbl tr.dr{cursor:pointer}.otbl tr.dr:hover td{background:var(--yw-l)}
.nowrap{white-space:nowrap}
.st{display:inline-block;padding:3px 9px;border-radius:11px;font-size:10px;font-weight:800;white-space:nowrap}
.st-pend{background:#3a3a3a;color:var(--yw)}.st-prog{background:var(--yw-l);color:#8a6d00;border:1px solid var(--yw)}
.st-done{background:var(--okb);color:var(--ok)}.st-canc{background:var(--nob);color:var(--no)}
.atags{display:flex;gap:3px;flex-wrap:wrap}
.atag{padding:2px 7px;border-radius:9px;font-size:9px;font-weight:800;white-space:nowrap;text-transform:uppercase}
.atag-v{background:#dbeafe;color:#1e40af}.atag-c{background:#f3e8ff;color:#6b21a8}.atag-d{background:#ffedd5;color:#9a3412}
.fbar{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fbar input,.fbar select{padding:7px 10px;border:1px solid var(--b);border-radius:6px;font-size:12px;font-family:inherit;background:#fff}
.fbar input:focus,.fbar select:focus{outline:none;border-color:var(--yw)}
.fbar input[type=text]{min-width:190px;flex:1}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.di .lbl{font-size:10px;color:var(--m);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.di .val{font-size:13px;margin-top:1px}
.fl{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.fc{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;background:var(--bg);border:1px solid var(--b);border-radius:6px;font-size:12px;text-decoration:none;color:var(--t);font-weight:600}
.fc:hover{border-color:var(--yw);background:var(--yw-l)}
.fuz{border:2px dashed var(--b);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;font-size:12px;color:var(--m);margin-top:7px;font-weight:600}
.fuz:hover{border-color:var(--yw);background:var(--yw-l)}.fuz input{display:none}
.ni{padding:9px 11px;background:var(--bg);border-radius:6px;margin-bottom:6px;font-size:13px;border-left:3px solid var(--yw)}
.ni-notif{border-left-color:#3b82f6;background:#eff6ff}
.ni-comp{border-left-color:var(--no);background:var(--nob)}
.ni .nm{font-size:10px;color:var(--m);margin-top:4px;font-weight:600}
.ab{padding:14px;border-radius:var(--r);border:2px solid var(--b);margin-top:11px}
.ab.pend{border-color:var(--yw);background:var(--yw-l)}
.ab.yes{border-color:var(--ok);background:var(--okb)}
.ab.no{border-color:var(--no);background:var(--nob)}
.conv-banner{padding:15px;border-radius:var(--r);background:var(--okb);border:2px solid var(--ok);text-align:center;font-weight:800;color:var(--ok);margin-bottom:12px}
.pwd-card{background:var(--yw-l);border:2px solid var(--yw);border-radius:var(--r);padding:18px;margin-bottom:14px}
.toast{position:fixed;bottom:16px;right:16px;padding:11px 17px;border-radius:var(--r);font-size:13px;z-index:1000;color:#fff;font-weight:700;animation:su .25s}
@keyframes su{from{transform:translateY(14px);opacity:0}}
.loading{display:flex;justify-content:center;padding:32px}
.spinner{width:26px;height:26px;border:3px solid var(--b);border-top-color:var(--yw);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.cfm-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.cfm{background:var(--s);border-radius:var(--r);padding:22px;max-width:420px;width:100%;border-top:4px solid var(--yw)}
.empty{text-align:center;padding:36px;color:var(--m);font-size:14px}
@media(max-width:768px){.otbl{font-size:11px}.otbl th,.otbl td{padding:7px 5px}.hdr{padding:0 12px}.hdr-client-logo{height:24px;max-width:80px;padding-left:10px}.ub{max-width:90px;font-size:11px}.dg{grid-template-columns:1fr}.cnt{padding:10px}.fbar input[type=text]{min-width:100%}}
</style>
</head>

function t(k){return (L[cl] && L[cl][k]) || L.pl[k] || k}

function setLang(l){
  cl = l; localStorage.setItem('s55_lang', l);
  document.querySelectorAll('[data-l]').forEach(b=>b.classList.toggle('active', b.dataset.l===l));
  applyLang();
}

function applyLang(){
  const set = (id,txt)=>{const e=document.getElementById(id); if(e) e.textContent=txt};
  set('llLogin',t('llLogin')); set('llPass',t('llPass')); set('llBtn',t('llBtn'));
  set('tabList',t('myOrders')); set('tabNew',t('newOrder'));

/* ============================================================
   API
   ============================================================ */
function api(data){
  data.session = session;
  return new Promise((res,rej)=>{
    const cb='_c'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    const p=encodeURIComponent(JSON.stringify(data));
    const url=API_URL+'?callback='+cb+'&payload='+p;
    if(url.length>7000) return apiPost(data).then(res).catch(rej);
    const s=document.createElement('script');
    const tm=setTimeout(()=>{rm();rej(new Error('Timeout'))},35000);
    function rm(){clearTimeout(tm);delete window[cb];if(s.parentNode)s.remove()}
    window[cb]=function(r){rm();if(r&&r.error&&/Sesja wygasła|Session expired/i.test(r.error)){doLogout();return}res(r)};
    s.src=url;s.onerror=function(){rm();rej(new Error('Network error'))};
    document.body.appendChild(s);
  });
}
async function apiPost(data){
  data.session=session;
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data),redirect:'follow'});
  const j=await r.json();
  if(j&&j.error&&/Sesja wygasła/i.test(j.error)) doLogout();
  return j;
}

async function doLogin(){
  const login=document.getElementById('inLogin').value.trim();
  const pass=document.getElementById('inPass').value;
  const err=document.getElementById('loginErr');
  const btn=document.getElementById('btnLogin');
  if(!login||!pass){err.textContent=t('error');return}
  btn.disabled=true; err.textContent='…';
  try{
    const r=await new Promise((res,rej)=>{
      const cb='_l'+Date.now();
      const p=encodeURIComponent(JSON.stringify({action:'login',login,password:pass}));
      const s=document.createElement('script');
      const tm=setTimeout(()=>{rm();rej(new Error('Timeout'))},35000);
      function rm(){clearTimeout(tm);delete window[cb];if(s.parentNode)s.remove()}
      window[cb]=function(r){rm();res(r)};
      s.src=API_URL+'?callback='+cb+'&payload='+p;
      s.onerror=function(){rm();rej(new Error('Network error'))};
      document.body.appendChild(s);
    });
    if(r.error) throw new Error(r.error);
    if(r.role!=='client'&&r.role!=='admin') throw new Error('Panel dla klientów');
    session=r.session; userName=r.name; userCompany=r.company||''; userLogo=r.logoUrl||'';
    mustChangePwd=r.mustChangePassword||false;
    localStorage.setItem('s55_sess',session);
    localStorage.setItem('s55_name',userName);
    localStorage.setItem('s55_logo',userLogo);
    // Login zwraca już listę zleceń — pomijamy osobne zapytanie
    if(r.orders){ allOrders=r.orders; ordersLoaded=true }
    showApp();
  }catch(e){err.textContent=e.message}
  finally{btn.disabled=false}
}

function doLogout(){
  if(session) api({action:'logout'}).catch(()=>{});
  session=''; userName=''; userLogo='';
  ['s55_sess','s55_name','s55_logo'].forEach(k=>localStorage.removeItem(k));
  document.getElementById('loginView').style.display='';
  document.getElementById('appView').style.display='none';
  document.getElementById('inPass').value='';
  document.getElementById('loginErr').textContent='';
}

function showApp(){
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='';
  document.getElementById('userLabel').textContent = userCompany && userCompany!==userName ? userCompany : userName;
  const lg=document.getElementById('clientLogo');
  if(userLogo){ lg.src=userLogo; lg.style.display=''; lg.onerror=()=>{lg.style.display='none'} }
  else lg.style.display='none';
  document.querySelectorAll('[data-l]').forEach(b=>b.classList.toggle('active', b.dataset.l===cl));

  }else{

}

function pendingAcc(o){
  // Pokazuje tylko pozycje czekające na akceptację, gdzie faktycznie jest co akceptować.
  // hasViz/hasCost przychodzą z lekkiej listy; vizFiles/costFile z pełnych danych zlecenia.
  const out=[];
  if(o.status!=='PENDING') return out;
  const hasViz  = o.hasViz  !== undefined ? o.hasViz  : !!(o.vizFiles && o.vizFiles.length);
  const hasCost = o.hasCost !== undefined ? o.hasCost : !!o.costFile;
  if(o.vizStatus==='PENDING'  && hasViz)  out.push('viz');
  if(o.costStatus==='PENDING' && hasCost) out.push('cost');
  if(o.dateStatus==='PENDING' && o.dateProposed) out.push('date');
  return out;
}
function accTags(o){
  const p=pendingAcc(o);
  if(!p.length) return '<span style="color:#bbb">—</span>';
  const m={viz:['atag-v',t('vizShort')],cost:['atag-c',t('costShort')],date:['atag-d',t('dateShort')]};
  return '<div class="atags">'+p.map(x=>'<span class="atag '+m[x][0]+'">'+m[x][1]+'</span>').join('')+'</div>';
}
function statusBadge(s){
  const m={PENDING:['st-pend',t('stPending')],IN_PROGRESS:['st-prog',t('stProgress')],DONE:['st-done',t('stDone')],CANCELLED:['st-canc',t('stCancel')]};
  const x=m[s]||['st-pend',s||'—'];
  return '<span class="st '+x[0]+'">'+x[1]+'</span>';
}

function filterTable(){
  const q=(document.getElementById('fS').value||'').toLowerCase();
  const fSt=document.getElementById('fSt').value;
  const fG=document.getElementById('fG').value;
  const fA=document.getElementById('fA').value;

  let items=allOrders.filter(o=>{
    if(fSt && o.status!==fSt) return false;
    if(fG && o.guardian!==fG) return false;
    if(fA){
      const p=pendingAcc(o);
      if(fA==='any'){ if(!p.length) return false }
      else if(!p.includes(fA)) return false;
    }
    if(q){
      const hay=[o.description,o.orderNo,o.clientOrderNo,o.tracking,o.guardian].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  items.sort((a,b)=>{
    let va=sortVal(a,sortCol), vb=sortVal(b,sortCol);
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });

  let h='';
  items.forEach(o=>{
    h+='<tr class="dr" onclick="openOrder(\''+o.id+'\')">';
    h+='<td class="nowrap" style="color:var(--m);font-size:12px">'+fmtD(o.dateCreated)+'</td>';
    h+='<td style="font-weight:600">'+esc((o.description||'').substring(0,50))+((o.description||'').length>50?'…':'')+'</td>';
    h+='<td>'+statusBadge(o.status)+'</td>';
    h+='<td style="font-size:12px">'+esc(o.orderNo||'—')+'</td>';
    h+='<td style="font-size:12px">'+esc(o.clientOrderNo||'—')+'</td>';
    h+='<td style="font-size:12px">'+esc(o.tracking||'—')+'</td>';
    h+='<td style="font-size:12px;font-weight:600">'+esc(o.guardian||'—')+'</td>';
    h+='<td>'+accTags(o)+'</td>';
    h+='<td style="color:#bbb;text-align:right">›</td></tr>';
  });
  if(!items.length) h='<tr><td colspan="9" class="empty">'+t('noOrders')+'</td></tr>';
  document.getElementById('tRows').innerHTML=h;
}

function sortVal(o,c){
  switch(c){
    case'dateCreated':   return o.dateCreated||'';
    case'description':   return (o.description||'').toLowerCase();
    case'status':        return o.status||'';
    case'orderNo':       return (o.orderNo||'').toLowerCase();
    case'clientOrderNo': return (o.clientOrderNo||'').toLowerCase();
    case'tracking':      return (o.tracking||'').toLowerCase();
    case'guardian':      return (o.guardian||'').toLowerCase();
    case'_acc':          return pendingAcc(o).length + pendingAcc(o).join('');
    default: return '';
  }
}
function sortBy(c){ if(sortCol===c) sortDir=sortDir==='asc'?'desc':'asc'; else {sortCol=c;sortDir='asc'} renderTable() }

    +'<div style="margin-top:9px"><div class="fg"><textarea id="cTxt" rows="2" placeholder="'+t('complaint')+'…"></textarea></div>'
    +'<button class="btn btn-no btn-sm" onclick="sendComplaint(\''+o.id+'\')">'+t('sendComplaint')+'</button></div></div>';

  el.innerHTML=h;
}

function di(l,v){return'<div class="di"><div class="lbl">'+l+'</div><div class="val">'+esc(v)+'</div></div>'}
function fileList(f){
  const a=Array.isArray(f)?f:[];
  if(!a.length) return '<p style="color:var(--m);font-size:12px">'+t('noFiles')+'</p>';
  return '<div class="fl">'+a.map(x=>'<a class="fc" href="'+esc(x.viewUrl||x.url||'#')+'" target="_blank">📎 '+esc(x.name||'Plik')+'</a>').join('')+'</div>';
}
function fileSec(title,files,oid,cat,canUp){
  let h='<div class="card"><div class="ch">'+title+'</div>'+fileList(files);
  if(canUp&&oid) h+='<div class="fuz" onclick="document.getElementById(\'u_'+cat+'\').click()">📎 '+t('upload')+'<input type="file" id="u_'+cat+'" multiple onchange="handleUp(this,\''+oid+'\',\''+cat+'\')"></div>';
  h+='</div>';return h;
}
function noteList(n,cls){
  if(!n||!n.length) return '<p style="color:var(--m);font-size:12px">—</p>';
  return n.map(x=>'<div class="ni '+(cls||'')+'"><div>'+esc(x.text)+'</div><div class="nm">'+fmtD(x.ts)+' · '+esc(x.by||'')+'</div></div>').join('');
}
function accBox(field,status,notes,oid){
  const na=Array.isArray(notes)?notes:[];
  const sc=status==='YES'?'yes':status==='NO'?'no':'pend';
  let h='<div class="ab '+sc+'">';
  if(status==='YES'){
    h+='<div style="font-weight:800;color:var(--ok)">'+t('accepted')+'</div>';
  }else{
    if(status==='NO') h+='<div style="font-weight:800;color:var(--no);margin-bottom:9px">'+t('rejected')+'</div>';
    h+='<div style="display:flex;gap:7px;flex-wrap:wrap">'
      +'<button class="btn btn-ok btn-sm" onclick="doAccept(\''+oid+'\',\''+field+'\',true)">✓ '+t('accept')+'</button>'
      +'<button class="btn btn-no btn-sm" onclick="doAccept(\''+oid+'\',\''+field+'\',false)">✕ '+t('reject')+'</button></div>';
  }
  if(na.length){
    h+='<div style="margin-top:10px;font-size:10px;font-weight:800;color:var(--m);text-transform:uppercase">'+t('prevNotes')+'</div>';
    na.forEach(n=>{h+='<div class="ni" style="margin-top:5px"><div>'+esc(n.text)+'</div><div class="nm">'+fmtD(n.ts)+'</div></div>'});
  }
  if(status!=='YES'){
    h+='<div style="margin-top:9px"><textarea id="nt_'+field+'" rows="2" style="width:100%;padding:8px 10px;border:1px solid var(--yw);border-radius:6px;font-size:12px;background:#fffef5;font-family:inherit" placeholder="'+t('noteReq')+'…"></textarea></div>';
  }
  h+='</div>';return h;
}

/* ============================================================
   ACTIONS
   ============================================================ */
function doAccept(oid,field,accept){
  if(accept){
    document.getElementById('cfmTitle').textContent=t('confirmTitle');
    document.getElementById('cfmMsg').textContent=t('confirmMsg');
    document.getElementById('cfmOk').textContent=t('confirmYes');
    document.getElementById('cfmNo').textContent=t('confirmNo');
    showCfm(async()=>{
      try{
        const r=await api({action:'accept',orderId:oid,field,accept:true});
        if(r.error)throw new Error(r.error);
        if(r.converted){toast(t('converted'));setTimeout(()=>showView('list'),1600)}
        else{toast(t('accepted'));openOrder(oid)}
      }catch(e){toast(e.message,'error')}
    });
  }else{
    const el=document.getElementById('nt_'+field);
    const note=el?el.value.trim():'';
    if(!note){toast(t('noteReq'),'error');if(el)el.focus();return}
    (async()=>{
      try{const r=await api({action:'accept',orderId:oid,field,accept:false,note});if(r.error)throw new Error(r.error);toast(t('sent'));openOrder(oid)}
      catch(e){toast(e.message,'error')}
    })();
  }
}
async function sendNote(oid){
  const el=document.getElementById('nTxt');const txt=el?el.value.trim():'';
  if(!txt)return;
  try{const r=await api({action:'addNote',orderId:oid,text:txt});if(r.error)throw new Error(r.error);toast(t('sent'));openOrder(oid)}
  catch(e){toast(e.message,'error')}
}
async function sendComplaint(oid){
  const el=document.getElementById('cTxt');const txt=el?el.value.trim():'';
  if(!txt)return;
  try{const r=await api({action:'addComplaint',orderId:oid,text:txt});if(r.error)throw new Error(r.error);toast(t('sent'));openOrder(oid)}
  catch(e){toast(e.message,'error')}
}
async function handleUp(inp,oid,cat){
  if(!inp.files.length)return;
  toast('…');
  for(const f of inp.files){ await uploadFile(f,oid,cat) }
  toast(t('uploaded')); openOrder(oid);
}
// Próg: powyżej 3MB base64 wysyłamy fragmentami (szybciej i bez timeoutów)
const CHUNK_THRESHOLD = 3000000;
const CHUNK_SIZE = 80000;

function uploadFile(file,oid,cat){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=async function(){
      try{
        const b64=r.result.split(',')[1];
        const meta={fileName:file.name,mimeType:file.type||'application/octet-stream',orderId:oid,fileCategory:cat};
        if(b64.length<=CHUNK_THRESHOLD){
          const out=await apiPost(Object.assign({action:'uploadClientFile',base64:b64},meta));
          if(out&&out.error)throw new Error(out.error);
          res(out);
        }else{
          res(await uploadChunked(b64,meta));
        }
      }catch(e){rej(e)}
    };
    r.onerror=rej; r.readAsDataURL(file);
  });
}

async function uploadChunked(b64,meta){
  const uploadId='u'+Date.now()+Math.floor(Math.random()*1e6);
  const total=Math.ceil(b64.length/CHUNK_SIZE);
  for(let i=0;i<total;i++){
    const chunk=b64.substr(i*CHUNK_SIZE,CHUNK_SIZE);
    const out=await apiPost({action:'uploadChunk',uploadId,chunkIndex:i,chunk});
    if(out&&out.error)throw new Error(out.error);
  }
  const fin=await apiPost(Object.assign({action:'uploadFinish',uploadId,totalChunks:total},meta));
  if(fin&&fin.error)throw new Error(fin.error);
  return fin;
}

function showCfm(cb){document.getElementById('cfmBox').style.display='';cfmCb=cb}
function closeCfm(){document.getElementById('cfmBox').style.display='none';cfmCb=null}
function execCfm(){if(cfmCb)cfmCb();closeCfm()}
