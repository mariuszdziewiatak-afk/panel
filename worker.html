<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Pracownika — studio55</title>
<style>
:root{--bk:#1a1a1a;--bk2:#242424;--bk3:#2a2a2a;--yw:#F5C518;--yw-d:#D4A800;--yw-l:#3a3200;--bg:#1a1a1a;--s:#2a2a2a;--b:#3a3a3a;--t:#f0f0f0;--m:#aaa;--r:8px;--ok:#16a34a;--okb:#14532d;--no:#dc2626;--nob:#450a0a;--bl:#3b82f6;--blb:#1e3a5f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bk);color:var(--t);line-height:1.65;font-size:0.9375rem}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bk);padding:20px}
.login-box{background:var(--bk2);border:1px solid var(--b);border-radius:12px;padding:36px;width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:26px}
.login-logo .brand{color:var(--yw);font-size:1.625rem;font-weight:900}
.login-logo .sub{color:#777;font-size:0.6875rem;letter-spacing:2px;margin-top:2px}
.lbl{display:block;font-size:0.75rem;font-weight:700;margin-bottom:5px;color:#aaa;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:11px 14px;background:var(--bk3)!important;border:1px solid #444;border-radius:6px;font-size:0.9375rem;color:#fff!important;-webkit-text-fill-color:#fff!important;font-family:inherit}
.inp:focus{outline:none;border-color:var(--yw);box-shadow:0 0 0 3px rgba(245,197,24,.15)}
.inp:-webkit-autofill,.inp:-webkit-autofill:hover,.inp:-webkit-autofill:focus{-webkit-text-fill-color:#fff!important;-webkit-box-shadow:0 0 0 1000px #2a2a2a inset!important;caret-color:#fff;transition:background-color 99999s ease 0s}
.btn-login{width:100%;padding:13px;background:var(--yw);color:var(--bk);border:none;border-radius:6px;font-size:1.0rem;font-weight:800;cursor:pointer;margin-top:8px}
.btn-login:hover{background:var(--yw-d)}.btn-login:disabled{opacity:.5}
.login-err{color:#f87171;font-size:0.8125rem;margin-top:10px;text-align:center;min-height:18px}

/* HEADER */
.hdr{background:var(--bk2);display:flex;align-items:center;justify-content:flex-end;gap:10px;height:48px;border-bottom:2px solid var(--yw);position:sticky;top:0;z-index:100;padding:0 16px}
.role-b{background:var(--yw);color:var(--bk);font-size:0.625rem;font-weight:900;padding:4px 10px;border-radius:11px;text-transform:uppercase}
.ub{font-size:0.8125rem;color:#ddd;background:var(--bk3);padding:5px 13px;border-radius:12px;border:1px solid var(--b);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.lb{background:none;border:1px solid #444;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:0.6875rem;color:#999;font-weight:700}
.lb:hover{border-color:var(--yw);color:var(--yw)}.lb.active{background:var(--yw);color:var(--bk);border-color:var(--yw)}
.btn-logout{background:none;border:1px solid #444;padding:5px 12px;border-radius:6px;font-size:0.8125rem;cursor:pointer;color:#888;font-weight:700}
.btn-logout:hover{border-color:var(--no);color:var(--no)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:150px 1fr;min-height:calc(100vh - 48px)}
.logo-col{background:#111;display:flex;flex-direction:column;align-items:center;padding:20px 8px;position:sticky;top:48px;height:calc(100vh - 48px);gap:12px}
.logo-col img{max-width:134px;max-height:120px;object-fit:contain}
.logo-txt{color:var(--yw);font-size:1.0rem;font-weight:900;text-align:center}
.cnt{padding:16px;min-width:0}

/* CARD */
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:12px}
.ch{font-size:0.8125rem;font-weight:800;margin-bottom:12px;padding-bottom:9px;border-bottom:2px solid var(--yw);text-transform:uppercase;letter-spacing:.4px;display:flex;justify-content:space-between;align-items:center;color:var(--t)}

/* FORMS */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:0.75rem;font-weight:700;margin-bottom:5px;color:var(--m);text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;border:1px solid var(--b);border-radius:6px;font-size:0.875rem;font-family:inherit;background:var(--bk3);color:var(--t);-webkit-text-fill-color:var(--t)}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--yw);box-shadow:0 0 0 3px rgba(245,197,24,.12)}
.fg select option{background:var(--bk3);color:var(--t)}
textarea{resize:vertical;min-height:64px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border:none;border-radius:6px;font-size:0.8125rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .12s}
.btn-p{background:var(--yw);color:var(--bk)}.btn-p:hover{background:var(--yw-d)}
.btn-o{background:none;border:1px solid var(--b);color:var(--t)}.btn-o:hover{background:var(--bk3)}
.btn-no{background:var(--no);color:#fff}.btn-sm{padding:5px 11px;font-size:0.75rem}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* TABLE */
table.otbl{width:100%;border-collapse:collapse;font-size:0.8125rem}
.otbl th{text-align:left;padding:11px 10px;background:var(--bk2);color:#ccc;font-size:0.75rem;font-weight:800;border-bottom:2px solid var(--yw);cursor:pointer;user-select:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.otbl th:hover{color:var(--yw)}.otbl th.sorted{color:var(--yw)}
.otbl th .arr{font-size:0.5625rem;margin-left:3px;opacity:.4}.otbl th.sorted .arr{opacity:1}
.otbl td{padding:12px 10px;border-bottom:1px solid var(--b);vertical-align:middle;font-size:0.875rem;line-height:1.5}
.otbl tr.dr{cursor:pointer}.otbl tr.dr:hover td{background:var(--yw-l)}
.nowrap{white-space:nowrap}

/* FILTER BAR */
.fbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fbar input,.fbar select{padding:8px 11px;border:1px solid var(--b);border-radius:6px;font-size:0.8125rem;font-family:inherit;background:var(--bk3);color:var(--t);-webkit-text-fill-color:var(--t)}
.fbar select option{background:var(--bk3);color:var(--t)}
.fbar input:focus,.fbar select:focus{outline:none;border-color:var(--yw)}
.fbar input[type=text]{min-width:200px;flex:1}

/* STATUS */
.st{display:inline-block;padding:4px 11px;border-radius:11px;font-size:0.75rem;font-weight:800;white-space:nowrap}
.st-pend{background:#333;color:var(--yw)}.st-prog{background:var(--yw-l);color:var(--yw)}
.st-done{background:var(--okb);color:#4ade80}.st-canc{background:var(--nob);color:#f87171}

/* DOTS */
.dots{display:inline-flex;gap:5px;align-items:center}
.dot-wrap{position:relative;cursor:default}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;cursor:help}
.d-y{background:#4ade80}.d-n{background:#f87171}.d-p{background:#666}.d-part{background:var(--yw)}
.dot-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bk2);border:1px solid var(--b);border-radius:5px;padding:4px 9px;font-size:0.6875rem;font-weight:700;white-space:nowrap;color:var(--t);z-index:50;pointer-events:none}
.dot-wrap:hover .dot-tip{display:block}

/* FILES */
.fl{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.fc{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;background:var(--bk3);border:1px solid var(--b);border-radius:6px;font-size:0.8125rem;text-decoration:none;color:var(--t);font-weight:600}
.fc:hover{border-color:var(--yw)}
.fuz{border:2px dashed var(--b);border-radius:var(--r);padding:13px;text-align:center;cursor:pointer;font-size:0.8125rem;color:var(--m);margin-top:8px;font-weight:600}
.fuz:hover{border-color:var(--yw);background:var(--yw-l)}.fuz input{display:none}

/* NOTES */
.ni{padding:11px 14px;background:var(--bk3);border-radius:6px;margin-bottom:8px;font-size:0.875rem;border-left:3px solid var(--yw);line-height:1.6}
.ni-team{border-left-color:#8b5cf6;background:#1e1b2e}
.ni-notif{border-left-color:var(--bl);background:var(--blb)}
.ni-comp{border-left-color:var(--no);background:var(--nob)}
.ni .nm{font-size:0.75rem;color:var(--m);margin-top:5px;font-weight:600}

/* ACC */
.acc-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--b);flex-wrap:wrap}
.acc-row:last-child{border:none}
.acc-lbl{font-size:0.8125rem;font-weight:800;min-width:140px;color:var(--t)}
.acc-st{font-size:0.8125rem;font-weight:700;min-width:130px}
.a-y{color:#4ade80}.a-n{color:#f87171}.a-p{color:#888}
.acc-note{flex:1;font-size:0.75rem;color:var(--m);min-width:180px}

/* MISC */
.pwd-card{background:#2a2700;border:2px solid var(--yw);border-radius:var(--r);padding:18px;margin-bottom:14px}
.prog-wrap{position:fixed;bottom:16px;right:16px;background:var(--bk2);border:1px solid var(--b);border-radius:10px;padding:12px 16px;z-index:1001;min-width:220px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.prog-label{font-size:12px;color:#ccc;margin-bottom:7px;font-weight:600}
.prog-bar{height:7px;background:#333;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--yw);border-radius:4px;transition:width .15s ease}
.prog-sub{font-size:10px;color:#888;margin-top:5px;text-align:right}
.toast{position:fixed;bottom:16px;right:16px;padding:12px 18px;border-radius:var(--r);font-size:0.875rem;z-index:1000;color:#fff;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.loading{display:flex;justify-content:center;padding:36px}
.spinner{width:28px;height:28px;border:3px solid var(--b);border-top-color:var(--yw);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px;color:var(--m);font-size:0.9375rem}

@media(max-width:900px){.layout{grid-template-columns:1fr}.logo-col{display:none}.dg,.dg3{grid-template-columns:1fr}.cnt{padding:10px}.otbl{font-size:0.75rem}.otbl th,.otbl td{padding:7px 5px}.fbar input[type=text]{min-width:100%}}
</style>
</head>

function setLang(l){
  cl=l;localStorage.setItem('s55_lang',l);
  document.querySelectorAll('[data-l]').forEach(b=>b.classList.toggle('active',b.dataset.l===l));
  applyLang();
}
function applyLang(){
  ['llLogin','llPass','llBtn'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=t(id)});
  const bl=document.getElementById('bLogout');if(bl)bl.title=t('logout')||'';
}

// ============ UTILS ============
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function fmtD(d){if(!d)return'—';try{const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString(cl==='de'?'de-DE':cl==='en'?'en-GB':'pl-PL',{year:'numeric',month:'2-digit',day:'2-digit'})}catch(e){return d}}
function fmtDT(d){if(!d)return'—';try{const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleString(cl==='de'?'de-DE':cl==='en'?'en-GB':'pl-PL',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}catch(e){return d}}
function toast(m,type){const e=document.createElement('div');e.className='toast';e.style.background=type==='error'?'var(--no)':'var(--ok)';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3200)}

// ============ API ============
// POST jest szybszy niż JSONP (brak overhead script tagu)
// Małe requesty (<6000 znaków) przez JSONP (GET), reszta przez POST
async function api(data){
  data.session=session;
  const payload=JSON.stringify(data);
  if(payload.length<5500) return apiGet_(data,payload);
  return apiPost_(payload);
}
function apiGet_(data,payload){
  return new Promise((res,rej)=>{
    const cb='_w'+Date.now()+'_'+(Math.random()*1e9|0);
    const url=API_URL+'?callback='+cb+'&payload='+encodeURIComponent(payload);
    const s=document.createElement('script');
    const tm=setTimeout(()=>{rm();rej(new Error('Timeout'))},30000);
    function rm(){clearTimeout(tm);delete window[cb];s.parentNode&&s.remove()}
    window[cb]=function(r){rm();if(r&&r.error&&/Sesja wygasła/i.test(r.error))doLogout();else res(r)};
    s.onerror=function(){rm();apiPost_(payload).then(res).catch(rej)};
    s.src=url;document.body.appendChild(s);
  });
}
async function apiPost_(payload){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:payload,redirect:'follow'});
  const j=await r.json();
  if(j&&j.error&&/Sesja wygasła/i.test(j.error))doLogout();
  return j;
}
// Alias dla plików (zawsze POST)
async function apiPost(data){data.session=session;return apiPost_(JSON.stringify(data));}

// ============ LOGIN ============
async function doLogin(){
  const login=document.getElementById('inLogin').value.trim();
  const pass=document.getElementById('inPass').value;
  const err=document.getElementById('loginErr');
  const btn=document.getElementById('btnLogin');
  if(!login||!pass){err.textContent='Podaj login i hasło';return}
  btn.disabled=true;err.textContent='…';
  try{
    const r=await new Promise((res,rej)=>{
      const cb='_l'+Date.now();
      const p=encodeURIComponent(JSON.stringify({action:'login',login,password:pass}));
      const s=document.createElement('script');
      const tm=setTimeout(()=>{rm();rej(new Error('Timeout'))},35000);
      function rm(){clearTimeout(tm);delete window[cb];if(s.parentNode)s.remove()}
      window[cb]=function(r){rm();res(r)};
      s.src=API_URL+'?callback='+cb+'&payload='+p;
      s.onerror=function(){rm();rej(new Error('Network error'))};
      document.body.appendChild(s);
    });
    if(r.error)throw new Error(r.error);
    if(r.role!=='worker'&&r.role!=='admin')throw new Error('Ten panel jest dla pracowników');
    session=r.session;userName=r.name;userRole=r.role;
    localStorage.setItem('s55w_sess',session);
    if(r.orders){allOrders=r.orders;ordersLoaded=true}
    if(r.workers)workers=r.workers;
    if(r.clients)clients=r.clients;
    if(r.lang) setLang(r.lang);
    showApp(r.mustChangePassword);
  }catch(e){err.textContent=e.message}
  finally{btn.disabled=false}
}

function doLogout(){
  if(session)api({action:'logout'}).catch(()=>{});
  session='';localStorage.removeItem('s55w_sess');
  document.getElementById('loginView').style.display='';
  document.getElementById('appView').style.display='none';
  document.getElementById('inPass').value='';
  document.getElementById('loginErr').textContent='';
}

async function showApp(mustChange){
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='';
  document.getElementById('userLabel').textContent=userName;
  document.getElementById('roleBadge').textContent=userRole==='admin'?'admin':t('stPend').replace('Oczekuje','').trim()||'pracownik';
  document.getElementById('roleBadge').textContent=userRole==='admin'?'ADMIN':'PRACOWNIK';
  document.querySelectorAll('[data-l]').forEach(b=>b.classList.toggle('active',b.dataset.l===cl));
  if(mustChange){
    document.getElementById('pwdPrompt').style.display='';
    document.getElementById('mainArea').style.display='none';
    return;
  }
  document.getElementById('pwdPrompt').style.display='none';
  document.getElementById('mainArea').style.display='';
  if(!workers.length||!clients.length){
    try{
      const[wr,cr]=await Promise.all([api({action:'listWorkers'}),api({action:'listClients'})]);
      workers=wr.workers||[];clients=cr.clients||[];
    }catch(e){}
  }
  loadOrders();
}

function setFontSize(sz){
  sz=parseInt(sz);
  localStorage.setItem('s55_fontsize',sz);
  // Skalowanie przez font-size na <html> — wszystkie rem w CSS skalują się automatycznie
  // S=80% M=100% L=120% XL=145% bazy (16px)
  const baseMap={13:12.8, 15:16, 17:19.2, 19:23.2};
  const base=baseMap[sz]||16;
  document.documentElement.style.fontSize=base+'px';
  document.querySelectorAll('.font-btn').forEach(function(b){
    const a=parseInt(b.dataset.sz)===sz;
    b.classList.toggle('active',a);
    b.classList.toggle('btn-p',a);
    b.classList.toggle('btn-o',!a);
  });
}

async function doChangeInitPwd(){
  const p1=document.getElementById('np1').value,p2=document.getElementById('np2').value;
  if(p1!==p2){toast(t('pwdMismatch'),'error');return}
  if(p1.length<6){toast(t('pwdShort'),'error');return}
  try{
    const r=await api({action:'changePassword',newPassword:p1});
    if(r.error)throw new Error(r.error);
    toast(t('pwdChanged'));
    document.getElementById('pwdPrompt').style.display='none';
    document.getElementById('mainArea').style.display='';
    const[wr,cr]=await Promise.all([api({action:'listWorkers'}),api({action:'listClients'})]);
    workers=wr.workers||[];clients=cr.clients||[];
    loadOrders();
  }catch(e){toast(e.message,'error')}
}

// ============ LIST ============
async function loadOrders(force){
  const el=document.getElementById('vList');
  document.getElementById('vDetail').style.display='none';
  el.style.display='';
  if(ordersLoaded&&!force){ordersLoaded=false;renderTable();return}
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const r=await api({action:'getOrders'});
    if(r.error)throw new Error(r.error);
    allOrders=r.orders||[];
    renderTable();
  }catch(e){el.innerHTML='<div class="card" style="color:var(--no);padding:20px;font-size:14px">'+esc(e.message)+'</div>'}
}

const COLS=[
  {k:'dateCreated',l:()=>t('date'),w:'86px'},
  {k:'clientId',l:()=>t('client'),w:'100px'},
  {k:'clientOrderNo',l:()=>t('clientNo'),w:'90px'},
  {k:'description',l:()=>t('desc'),w:''},
  {k:'status',l:()=>t('status'),w:'102px'},
  {k:'orderNo',l:()=>t('orderNo'),w:'90px'},
  {k:'tracking',l:()=>t('tracking'),w:'90px'},
  {k:'guardian',l:()=>t('guardian'),w:'96px'},
  {k:'_acc',l:()=>t('acc'),w:'76px'},
];

function renderTable(){
  const el=document.getElementById('vList');
  const clientList=[...new Set(allOrders.map(o=>o.clientId).filter(Boolean))].sort();

  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h+='<div class="fbar" style="margin:0;flex:1">';
  h+='<input type="text" id="fS" placeholder="🔍 '+t('searchPh')+'" oninput="filterTable()">';
  h+='<select id="fSt" onchange="filterTable()"><option value="">'+t('filterStatus')+'</option><option value="PENDING">'+t('stPend')+'</option><option value="IN_PROGRESS">'+t('stProg')+'</option><option value="DONE">'+t('stDone')+'</option><option value="CANCELLED">'+t('stCanc')+'</option></select>';
  h+='<select id="fC" onchange="filterTable()"><option value="">'+t('filterClient')+'</option>'+clientList.map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('')+'</select>';
  h+='<select id="fG" onchange="filterTable()"><option value="">'+t('filterGuardian')+'</option><option value="__none">'+t('noGuardian')+'</option>'+workers.map(w=>'<option value="'+esc(w.login)+'">'+esc(w.name||w.login)+'</option>').join('')+'</select>';
  h+='<button class="btn btn-o btn-sm" onclick="loadOrders(true)" title="'+t('refresh')+'">↻</button>';
  h+='</div>';
  h+='<button class="btn btn-p btn-sm" style="margin-left:10px;white-space:nowrap" onclick="showNewOrderForm()">'+t('newOrder')+'</button>';
  h+='</div>';
  h+='<div id="newOrderArea"></div>';
  h+='<div class="card" style="padding:0;overflow-x:auto"><table class="otbl"><thead><tr>';
  COLS.forEach(c=>{
    const s=sortCol===c.k;
    h+='<th class="'+(s?'sorted':'')+'" onclick="sortBy(\''+c.k+'\')"'+(c.w?' style="width:'+c.w+'"':'')+'>'+c.l()+'<span class="arr">'+(s?(sortDir==='asc'?'▲':'▼'):'⇅')+'</span></th>';
  });
  h+='<th style="width:22px"></th></tr></thead><tbody id="tRows"></tbody></table></div>';
  el.innerHTML=h;
  filterTable();
}

function statusBadge(s){
  const m={PENDING:['st-pend',t('stPend')],IN_PROGRESS:['st-prog',t('stProg')],DONE:['st-done',t('stDone')],CANCELLED:['st-canc',t('stCanc')]};
  const x=m[s]||['st-pend',s||'—'];
  return '<span class="st '+x[0]+'">'+x[1]+'</span>';
}

function dot(s,label){
  const cls=s==='YES'?'d-y':s==='NO'?'d-n':s==='PARTIAL'?'d-part':'d-p';
  const stxt=s==='YES'?t('yes'):s==='NO'?t('no'):s==='PARTIAL'?t('vizPartial')||'Częściowo':'Oczekuje';
  return '<span class="dot-wrap"><span class="dot '+cls+'"></span><span class="dot-tip">'+esc(label)+': '+stxt+'</span></span>';
}

function filterTable(){
  const q=(document.getElementById('fS').value||'').toLowerCase();
  const fSt=(document.getElementById('fSt')||{}).value||'';
  const fC=(document.getElementById('fC')||{}).value||'';
  const fG=(document.getElementById('fG')||{}).value||'';

  let items=allOrders.filter(o=>{
    if(fSt&&o.status!==fSt)return false;
    if(fC&&o.clientId!==fC)return false;
    if(fG){if(fG==='__none'){if(o.guardian)return false}else if(o.guardian!==fG)return false}
    if(q){
      const hay=[o.description,o.orderNo,o.clientOrderNo,o.tracking,o.clientId,o.guardian,o.id].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  items.sort((a,b)=>{let va=sv(a,sortCol),vb=sv(b,sortCol);if(va<vb)return sortDir==='asc'?-1:1;if(va>vb)return sortDir==='asc'?1:-1;return 0});

  const tb=document.getElementById('tRows');
  let h='';
  items.forEach(o=>{
    h+='<tr class="dr" onclick="openOrder(\''+o.id+'\')">';
    h+='<td class="nowrap" style="color:var(--m);font-size:12px">'+fmtD(o.dateCreated)+'</td>';
    h+='<td style="font-size:12px;font-weight:700">'+esc(o.clientId||'—')+'</td>';
    h+='<td style="font-size:12px">'+esc(o.clientOrderNo||'—')+'</td>';
    h+='<td style="font-weight:600">'+esc((o.description||'').substring(0,46))+((o.description||'').length>46?'…':'')+'</td>';
    h+='<td>'+statusBadge(o.status)+'</td>';
    h+='<td style="font-size:12px">'+esc(o.orderNo||'—')+'</td>';
    h+='<td style="font-size:12px">'+esc(o.tracking||'—')+'</td>';
    h+='<td style="font-size:12px;font-weight:600">'+esc(o.guardian||'—')+'</td>';
    h+='<td>'+( o.status==='PENDING'
      ?'<div class="dots">'+dot(o.vizStatus,t('viz'))+dot(o.costStatus,t('cost'))+dot(o.dateStatus,t('dateProp'))+'</div>'
      :'<span style="color:#555">—</span>'
    )+'</td>';
    h+='<td style="color:#555;text-align:right">›</td></tr>';
  });
  if(!items.length)h='<tr><td colspan="10" class="empty">'+t('noOrders')+'</td></tr>';
  tb.innerHTML=h;
}

function sv(o,c){
  switch(c){
    case'dateCreated':return o.dateCreated||'';
    case'clientId':return(o.clientId||'').toLowerCase();
    case'clientOrderNo':return(o.clientOrderNo||'').toLowerCase();
    case'description':return(o.description||'').toLowerCase();
    case'status':return o.status||'';
    case'orderNo':return(o.orderNo||'').toLowerCase();
    case'tracking':return(o.tracking||'').toLowerCase();
    case'guardian':return(o.guardian||'').toLowerCase();
    case'_acc':return(o.vizStatus||'P')+(o.costStatus||'P')+(o.dateStatus||'P');
    default:return'';
  }
}
function sortBy(c){if(sortCol===c)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=c;sortDir='asc'}renderTable()}

function handleNewFiles(inp){
  const el=document.getElementById('nFilesList');
  if(!el)return;
  el.innerHTML=Array.from(inp.files).map(f=>'<span class="fc">📎 '+esc(f.name)+'</span>').join('');
}

async function submitNewOrder(){
  const clientId=document.getElementById('nClient').value;
  const desc=document.getElementById('nDesc').value.trim();
  if(!clientId){toast(t('clientSelect'),'error');return}
  if(!desc){toast(t('descLbl'),'error');return}
  const btn=document.getElementById('bSubmit');btn.disabled=true;
  try{
    const r=await api({action:'createOrder',order:{
      clientId,
      orderNo:document.getElementById('nOrderNo').value.trim(),
      clientOrderNo:document.getElementById('nClientNo').value.trim(),
      description:desc,
      deliveryAddr:document.getElementById('nAddr').value.trim(),
      sender:document.getElementById('nSender').value.trim(),
      waybill:document.getElementById('nWaybill').value.trim(),
      guardian:document.getElementById('nGuardian').value,
    }});
    if(r.error)throw new Error(r.error);
    curId=r.orderId;
    const nwf=document.getElementById('nWaybillFile');
    if(nwf&&nwf.files.length){for(const f of nwf.files){await uploadOne(f,'trackingFile')}}
    const nf=document.getElementById('nFiles');
    if(nf&&nf.files.length){for(const f of nf.files){await uploadOne(f,'attachments')}}
    toast(t('saved'));
    document.getElementById('newOrderArea').innerHTML='';
    loadOrders(true);
  }catch(e){toast(e.message,'error')}
  finally{btn.disabled=false}
}

// ============ ORDER DETAIL ============
async function openOrder(id){
  curId=id;
  document.getElementById('vList').style.display='none';
  const el=document.getElementById('vDetail');
  el.style.display='';
  el.innerHTML='<button class="btn btn-o btn-sm" onclick="backToList()" style="margin-bottom:10px">'+t('back')+'</button><div class="loading"><div class="spinner"></div></div>';
  try{
    const r=await api({action:'getOrder',orderId:id});
    if(r.error)throw new Error(r.error);
    curOrder=r.order;renderDetail(r.order);
  }catch(e){el.innerHTML='<button class="btn btn-o btn-sm" onclick="backToList()">'+t('back')+'</button><div class="card" style="margin-top:10px;color:var(--no)">'+esc(e.message)+'</div>'}
}

// ── VIZ PRODUCTS UI ──
function renderVizProducts(o){
  const prods=o.vizProducts||[];
  let h='<div class="card"><div class="ch">🎨 '+t('vizSec');
  h+=' <button class="btn btn-p btn-sm" onclick="addVizProduct()">'+t('addProduct')+'</button></div>';
  if(!prods.length){
    h+='<p style="color:var(--m);font-size:13px">'+t('noProducts')+'</p>';
  }else{
    prods.forEach(function(p){
      const st=p.status||'PENDING';
      const stCls=st==='YES'?'color:#4ade80':st==='NO'?'color:#f87171':'color:#aaa';
      const stTxt=st==='YES'?t('yes'):st==='NO'?t('no'):t('pend');
      const pid=p.id;
      h+='<div style="border:1px solid var(--b);border-radius:6px;padding:12px;margin-bottom:10px">';
      h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
      h+='<strong style="font-size:14px">'+esc(p.name)+'</strong>';
      h+='<div style="display:flex;align-items:center;gap:8px">';
      h+='<span style="font-size:12px;font-weight:700;'+stCls+'">'+stTxt+'</span>';
      h+='<button class="btn btn-no btn-sm" data-pid="'+pid+'" data-pname="'+esc(p.name)+'" onclick="deleteVizProduct(this.dataset.pid,this.dataset.pname)">✕</button>';
      h+='</div></div>';
      if(p.files&&p.files.length){
        h+='<div class="fl" style="margin-bottom:8px">'+p.files.map(function(f){return '<a class="fc" href="'+esc(f.viewUrl||f.url||'#')+'" target="_blank">📎 '+esc(f.name)+'</a>';}).join('')+'</div>';
      }else{
        h+='<p style="color:var(--m);font-size:12px;margin-bottom:6px">'+t('noFiles')+'</p>';
      }
      const inputId='vup_'+pid;
      h+='<label for="'+inputId+'" class="fuz" style="display:block;cursor:pointer">📎 '+t('clickUpload')+'<input type="file" id="'+inputId+'" multiple style="display:none" data-vpid="'+pid+'" onchange="handleVizProductUp(this,this.dataset.vpid)"></label>';
      if(p.notes&&p.notes.length){
        h+='<div style="margin-top:8px">';
        p.notes.forEach(function(n){h+='<div class="ni ni-comp"><div>'+esc(n.text)+'</div><div class="nm">'+fmtDT(n.ts)+' · '+esc(n.by||'')+'</div></div>';});
        h+='</div>';
      }
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}
async function addVizProduct(){
  const name=prompt(t('productName'));
  if(!name||!name.trim())return;
  try{
    const r=await api({action:'addVizProduct',orderId:curId,productName:name.trim()});
    if(r.error)throw new Error(r.error);
    if(curOrder&&r.products){curOrder.vizProducts=r.products;patchSection('vizSection',renderVizProducts(curOrder));}
    toast(t('saved'));silentRefresh();
  }catch(e){toast(e.message,'error')}
}

async function deleteVizProduct(productId,productName){
  if(!confirm('Usunąć produkt "'+(productName||productId)+'"?'))return;
  try{
    const r=await api({action:'deleteVizProduct',orderId:curId,productId});
    if(r.error)throw new Error(r.error);
    if(curOrder&&r.products){
      curOrder.vizProducts=r.products;
      const vizEl=document.getElementById('vizSection');
      if(vizEl)vizEl.innerHTML=renderVizProducts(curOrder);
    }
    toast(t('saved'));
  }catch(e){toast(e.message,'error')}
}

async function handleVizProductUp(inp,productId){
  if(!inp.files.length)return;
  const _files=Array.from(inp.files);
  showProgress(t('vizSec')+' (0/'+_files.length+')');
  try{
    for(let _i=0;_i<_files.length;_i++){
      const result=await uploadOneWithProgress(_files[_i],'vizProductFile',function(pct){
        setProgress(((_i+pct/100)/_files.length)*100,(_i+1)+'/'+_files.length+' — '+Math.round(pct)+'%');
      },{productId:productId});
      if(result&&result.file&&curOrder){
        const prods=curOrder.vizProducts||[];
        const p=prods.find(function(x){return x.id===productId});
        if(p){if(!p.files)p.files=[];p.files.push(result.file);}
        patchSection('vizSection',renderVizProducts(curOrder));
      }
    }
    hideProgress();toast(t('uploaded'));silentRefresh();
  }catch(e){hideProgress();toast(e.message,'error')}
}

function uploadOneVizProduct(file,productId){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=async function(){
      try{
        const b64=r.result.split(',')[1];
        const meta={fileName:file.name,mimeType:file.type||'application/octet-stream',orderId:curId,fileCategory:'vizProductFile',productId};
        if(b64.length<=CHUNK_THRESHOLD){
          const out=await apiPost(Object.assign({action:'uploadWorkerFile',base64:b64},meta));
          if(out&&out.error)throw new Error(out.error);res(out);
        }else{
          const uploadId='u'+Date.now()+Math.floor(Math.random()*1e6);
          const total=Math.ceil(b64.length/CHUNK_SIZE);
          for(let i=0;i<total;i++){
            const out=await apiPost({action:'uploadChunk',uploadId,chunkIndex:i,chunk:b64.substr(i*CHUNK_SIZE,CHUNK_SIZE)});
            if(out&&out.error)throw new Error(out.error);
          }
          const fin=await apiPost(Object.assign({action:'uploadFinish',uploadId,totalChunks:total},meta));
          if(fin&&fin.error)throw new Error(fin.error);res(fin);
        }
      }catch(e){rej(e)}
    };
    r.onerror=rej;r.readAsDataURL(file);
  });
}

function silentRefresh(){

function patchSection(id,html){var e=document.getElementById(id);if(e)e.innerHTML=html;}

// CHUNK UPLOAD

// ── Pasek postępu ──
let _progEl=null;
function showProgress(label){
  hideProgress();
  const d=document.createElement('div');
  d.className='prog-wrap';d.id='_prog';
  d.innerHTML='<div class="prog-label">'+label+'</div><div class="prog-bar"><div class="prog-fill" id="_pf" style="width:0%"></div></div><div class="prog-sub" id="_ps">0%</div>';
  document.body.appendChild(d);_progEl=d;
}
function setProgress(pct,sub){
  const f=document.getElementById('_pf');const s=document.getElementById('_ps');
  if(f)f.style.width=Math.round(pct)+'%';
  if(s)s.textContent=(sub||Math.round(pct)+'%');
}
function hideProgress(){const e=document.getElementById('_prog');if(e)e.remove();_progEl=null;}

const CHUNK_THRESHOLD=4000000,CHUNK_SIZE=200000;
async function handleUp(inp,field){
  if(!inp.files.length)return;
  const _files=Array.from(inp.files);
  showProgress(t('clickUpload')+' (0/'+_files.length+')');
  try{
    const results=[];
    for(let _i=0;_i<_files.length;_i++){
      const r=await uploadOneWithProgress(_files[_i],field,function(pct){
        setProgress(((_i+pct/100)/_files.length)*100,(_i+1)+'/'+_files.length+' — '+Math.round(pct)+'%');
      });
      if(r&&r.file)results.push(r.file);
    }
    hideProgress();
    if(curOrder&&results.length){
      const arr=['attachments','paymentConf','prodPhotos','trackingFile'];
      results.forEach(function(fi){
        if(arr.indexOf(field)!==-1){if(!curOrder[field])curOrder[field]=[];curOrder[field].push(fi);}
        else curOrder[field]=fi;
      });
      renderDetail(curOrder);
    }
    toast(t('uploaded'));silentRefresh();
  }catch(e){hideProgress();toast(e.message,'error')}
}

async function _doUpload(b64, meta, onProgress){
  if(b64.length<=CHUNK_THRESHOLD){
    if(onProgress)onProgress(40);
    const out=await apiPost(Object.assign({action:'uploadWorkerFile',base64:b64},meta));
    if(out&&out.error)throw new Error(out.error);
    if(onProgress)onProgress(100);
    return out;
  }
  const uploadId='u'+Date.now()+(Math.random()*1e6|0);
  const total=Math.ceil(b64.length/CHUNK_SIZE);
  for(let i=0;i<total;i++){
    const out=await apiPost({action:'uploadChunk',uploadId,chunkIndex:i,chunk:b64.substr(i*CHUNK_SIZE,CHUNK_SIZE)});
    if(out&&out.error)throw new Error(out.error);
    if(onProgress)onProgress(Math.round(((i+1)/total)*85));
  }
  const fin=await apiPost(Object.assign({action:'uploadFinish',uploadId,totalChunks:total},meta));
  if(fin&&fin.error)throw new Error(fin.error);
  if(onProgress)onProgress(100);
  return fin;
}

function uploadOneWithProgress(file, field, onProgress, extraMeta){
  return new Promise(function(res,rej){
    const fr=new FileReader();
    fr.onload=async function(){
      try{
        const b64=fr.result.split(',')[1];
        const meta=Object.assign({fileName:file.name,mimeType:file.type||'application/octet-stream',orderId:curId,fileCategory:field},extraMeta||{});
        res(await _doUpload(b64,meta,onProgress));
      }catch(e){rej(e)}
    };
    fr.onerror=rej;fr.readAsDataURL(file);
  });
}

function uploadOne(file,field){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=async function(){
      try{
        const b64=r.result.split(',')[1];
        const meta={fileName:file.name,mimeType:file.type||'application/octet-stream',orderId:curId,fileCategory:field};
        if(b64.length<=CHUNK_THRESHOLD){
          const out=await apiPost(Object.assign({action:'uploadWorkerFile',base64:b64},meta));
          if(out&&out.error)throw new Error(out.error);res(out);
        }else{
          const uploadId='u'+Date.now()+Math.floor(Math.random()*1e6);
          const total=Math.ceil(b64.length/CHUNK_SIZE);
          for(let i=0;i<total;i++){
            const out=await apiPost({action:'uploadChunk',uploadId,chunkIndex:i,chunk:b64.substr(i*CHUNK_SIZE,CHUNK_SIZE)});
            if(out&&out.error)throw new Error(out.error);
          }
          const fin=await apiPost(Object.assign({action:'uploadFinish',uploadId,totalChunks:total},meta));
          if(fin&&fin.error)throw new Error(fin.error);res(fin);
        }
      }catch(e){rej(e)}
    };
    r.onerror=rej;r.readAsDataURL(file);
  });
}

function handleCompChange(inp){
  wCompFiles=Array.from(inp.files);
  const el=document.getElementById('compFL');
  if(el)el.innerHTML=wCompFiles.map(f=>'<span class="fc">📎 '+esc(f.name)+'</span>').join('');
}
async function addWorkerComplaint(){
  const txtEl=document.getElementById('compTxt');
  const txt=txtEl?txtEl.value.trim():'';
  if(!txt){toast(t('complaint'),'error');return}
  try{
    const r=await api({action:'addComplaint',orderId:curId,text:txt});
    if(r.error)throw new Error(r.error);
    for(const f of wCompFiles){await uploadOne(f,'complaintFiles')}
    if(curOrder){
      if(!curOrder.complaint)curOrder.complaint=[];
      curOrder.complaint.push({text:txt,files:[],ts:new Date().toISOString(),by:userName});
      patchSection('complaintSection',noteList(curOrder.complaint,'ni-comp'));
      const ct=document.getElementById('compTxt');if(ct)ct.value='';
      const cfl=document.getElementById('compFL');if(cfl)cfl.innerHTML='';
    }
    toast(t('sent'));wCompFiles=[];silentRefresh();
  }catch(e){toast(e.message,'error')}
}

async function addNote(type){
  const el=document.getElementById(type==='team'?'tNote':'cNote');
  const txt=el?el.value.trim():'';if(!txt)return;
  try{
    const r=await api({action:type==='team'?'addTeamNote':'addClientNotif',orderId:curId,text:txt});
    if(r.error)throw new Error(r.error);
    const note={text:txt,ts:new Date().toISOString(),by:userName};
    if(curOrder){
      if(type==='team'){if(!curOrder.teamNotes)curOrder.teamNotes=[];curOrder.teamNotes.push(note);patchSection('teamNotesSection',noteList(curOrder.teamNotes,'ni-team'));}
      else{if(!curOrder.clientNotifs)curOrder.clientNotifs=[];curOrder.clientNotifs.push(note);patchSection('clientNotifsSection',noteList(curOrder.clientNotifs,'ni-notif'));}
      el.value='';
    }
    toast(t('sent'));silentRefresh();
  }catch(e){toast(e.message,'error')}
}
